<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; cursor: none; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const SPACING    = 40;
  const MOUSE_R    = 200;
  const BASE_R     = 1.5;
  const MAX_EXTRA  = 4.5;
  const IDLE_EXTRA = 0.8;
  const IDLE_SPEED = 0.001;

  let cols, rows;
  let mouse = { x: -9999, y: -9999 };

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.ceil(canvas.width  / SPACING) + 1;
    rows = Math.ceil(canvas.height / SPACING) + 1;
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  resize();

  function drawCursor() {
    const x = mouse.x, y = mouse.y;
    if (x < -999) return;

    // outer ring
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // centre dot
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 200, 200, 0.9)';
    ctx.fill();
  }

  function draw(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = col * SPACING;
        const y = row * SPACING;

        const phase = (col * 1.3 + row * 2.7);
        const idle  = (Math.sin(ts * IDLE_SPEED * Math.PI * 2 + phase) + 1) / 2;

        const dist  = Math.hypot(x - mouse.x, y - mouse.y);
        const hover = Math.max(0, 1 - dist / MOUSE_R);

        const r     = BASE_R + idle * IDLE_EXTRA + hover * MAX_EXTRA;
        const alpha = 0.12 + idle * 0.1 + hover * 0.6;

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 180, 180, ${alpha})`;
        ctx.fill();
      }
    }

    drawCursor();
    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
</script>
</body>
</html>
