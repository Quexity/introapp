<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
 
  const SPACING = 40;
  let cols, rows, cx, cy;
 
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.ceil(canvas.width / SPACING) + 1;
    rows = Math.ceil(canvas.height / SPACING) + 1;
    cx = canvas.width / 2;
    cy = canvas.height / 2;
  }
 
  window.addEventListener('resize', resize);
  resize();
 
  const BASE_RADIUS = 1.5;
  const MAX_EXTRA   = 3.5;
  const WAVE_SPEED  = 0.0018;
  const WAVE_LENGTH = 200;
 
  function draw(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
 
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = col * SPACING;
        const y = row * SPACING;
 
        const dist = Math.hypot(x - cx, y - cy);
        const wave = Math.sin(dist / WAVE_LENGTH - ts * WAVE_SPEED * Math.PI * 2);
        const t = (wave + 1) / 2;
 
        const radius = BASE_RADIUS + t * MAX_EXTRA;
        const alpha  = 0.15 + t * 0.55;
 
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 180, 180, ${alpha})`;
        ctx.fill();
      }
    }
 
    requestAnimationFrame(draw);
  }
 
  requestAnimationFrame(draw);
</script>
</body>
</html>
